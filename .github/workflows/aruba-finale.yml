name: Deploy to Aruba

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to FTP
        uses: sebastianpopp/ftp-action@v2.0.0
        with:
          host: 31.11.35.201
          user: 1235499@aruba.it
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: dist
          remoteDir: public
          forceSsl: false
