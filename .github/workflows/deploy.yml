name: 🚀 Deploy Final - No Win

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build website
        run: npm run build

      - name: 🚀 Deploy to FTP (Sebastian Popp)
        uses: sebastianpopp/ftp-action@v2.0.0
        with:
          host: ftp.massimodistefano.com
          user: 1235499@aruba.it
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: dist
          remoteDir: public
          forceSsl: false
